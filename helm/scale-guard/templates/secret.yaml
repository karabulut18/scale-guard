apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  # stringData lets Helm encode the value — no manual base64 needed.
  # Override with: helm install ... --set db.url="postgres://..."
  db-url: {{ .Values.db.url | quote }}
